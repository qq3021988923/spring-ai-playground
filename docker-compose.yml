# Docker Compose 配置文件的语法版本
# 3.8 是较新的稳定版，支持几乎所有功能
version: '3.8'

# 定义所有的服务（即容器）
services:

  # 服务名称：postgres，可以自定义，只是内部使用的名称
  postgres:
    # 使用的 Docker 镜像
    # pgvector/pgvector:pg16 同时包含了 PostgreSQL 16 和 pgvector 向量扩展
    # 这样就省去了手动安装扩展的步骤
    image: pgvector/pgvector:pg16

    # 给这个容器指定一个固定的名字
    # 启动后你可以用 `docker start yu-ai-pgvector` 等命令来管理
    container_name: yu-ai-pgvector

    # 环境变量：在容器第一次启动时用于初始化数据库
    environment:
      # 数据库超级用户名（默认就是 postgres）
      POSTGRES_USER: postgres
      # 数据库超级用户密码
      POSTGRES_PASSWORD: postgres
      # 启动后自动创建的业务数据库名
      # 项目里就可以直接连这个数据库，不用再手动创建
      POSTGRES_DB: yu_ai_db

    # 端口映射：将电脑（宿主机）的端口映射到容器内部的端口
    # 格式：宿主机端口:容器端口
    # 映射端口：宿主机 5433 → 容器 5432（容器内部默认监听 5432）
    # 应用通过 localhost:5433 连接数据库
    ports:
      - "5433:5432"

    # 数据卷：用于持久化存储数据库文件
    # 把容器里 /var/lib/postgresql/data 目录（数据库数据存放位置）
    # 映射到宿主机上由 Docker 管理的 postgres_data 卷
    # 好处：即使删除容器，数据也不会丢失；重新创建容器时可以直接挂载这个卷
    volumes:
      - postgres_data:/var/lib/postgresql/data

# 声明一个命名卷（named volume）
# 卷由 Docker 自动管理，实际存储位置在 Docker 的数据目录，宿主机上不需要手动创建
volumes:
  postgres_data: