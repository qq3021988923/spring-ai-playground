version: '3.8'

services:

  # ==================== PostgreSQL + PgVector ====================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: yu-ai-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yu_ai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yu_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Spring Boot 应用 ====================
  app:
    build: .
    container_name: yu-ai-app
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      pgvector:
        condition: service_healthy

volumes:
  postgres_data:
